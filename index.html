<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RECIBOS - DIDEC</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5.3 CSS & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0b1329 0%, #1e293b 50%, #0f172a 100%);
      --accent-color: #0284c7;
      --accent-hover: #0369a1;
      --glass-bg: rgba(30, 41, 59, 0.75);
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Fondo animado sutil */
    .bg-glow {
      position: absolute;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(2, 132, 199, 0.25) 0%, rgba(0, 0, 0, 0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
      animation: pulseGlow 6s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
      100% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    .portal-card {
      position: relative;
      z-index: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .portal-card:hover {
      box-shadow: 0 30px 60px -12px rgba(2, 132, 199, 0.25);
    }

    .shield-badge {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, rgba(2, 132, 199, 0.2) 0%, rgba(15, 23, 42, 0.8) 100%);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-portal {
      background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
      color: #ffffff !important;
      font-weight: 700;
      border: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      width: 100%;
      letter-spacing: 0.02em;
      box-shadow: 0 8px 25px rgba(2, 132, 199, 0.4);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .btn-portal:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(2, 132, 199, 0.6);
      background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
    }

    .btn-portal:active {
      transform: translateY(1px);
    }

    .redirect-notice {
      font-size: 12px;
      color: #94a3b8;
      background: rgba(15, 23, 42, 0.6);
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 1.5rem;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 8px #10b981;
    }
  </style>
</head>
<body>

  <!-- Glow de fondo -->
  <div class="bg-glow"></div>

  <!-- Tarjeta Central del Portal -->
  <div class="portal-card text-center">
    
    <!-- Emblema de la Institución -->
    <div class="shield-badge">
      <i class="bi bi-shield-check" style="font-size: 3rem; color: #38bdf8;"></i>
    </div>

    <!-- Encabezados Institucionales -->
    <h2 class="fw-extrabold text-white mb-1" style="font-weight: 800; letter-spacing: -0.03em; font-size: 24px;">
      D.I.D.EC
    </h2>
    <h5 class="fw-semibold text-info mb-3" style="font-size: 15px; letter-spacing: 0.05em; text-transform: uppercase;">
      OFICINA DE JUDICIALES
    </h5>
    
    <p class="text-slate-300 small mb-4" style="color: #cbd5e1; font-size: 13.5px; line-height: 1.5;">
      Gestión de Recibos de expedientes y actuaciones judiciales<br>
    </p>

    <!-- Botón Principal de Acceso -->
    <a id="btnIngresar" href="https://script.google.com/macros/s/AKfycbxifKH46U6ev7jwTF3PPZiP78rsJoqBSYdmPmUPncjPEKmIbPZbZUpMmoUQ01i01Goz/exec" class="btn btn-portal">
      <i class="bi bi-box-arrow-in-right fs-5"></i>
      <span>Ingresar al Sistema</span>
    </a>

    <!-- Aviso e Indicador de Servidor -->
    <div class="redirect-notice d-flex align-items-center justify-content-center mt-4">
      <span class="status-dot"></span>
      <span>Servidor Operativo • Acceso Seguro HTTPS</span>
    </div>

    <!-- Pie Institucional -->
    <div class="mt-4 pt-3 border-top border-secondary border-opacity-25 text-secondary" style="font-size: 11px; color: #64748b !important;">
      Acceso reservado para personal autorizado.<br>
      Portal de Enlace Permanente v1.0
    </div>

  </div>

  <script>
    // Enlace centralizado a la Web App en producción
    const TARGET_URL = "https://script.google.com/macros/s/AKfycbzoW6xCW3hy0q4dp5gC48URhfxzWFfkzpYPPshyjZZ0P2QiQ1zQu1kVZLZkK4KdfOQM/exec";
  </script>

</body>
</html>
